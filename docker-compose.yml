# =============================================================
# MiroFish-Offline — Battlematrix bm-control
# =============================================================
# What runs HERE (bm-control):
#   - mirofish-offline  (this compose)
#   - mirofish-neo4j    (already running, external container)
#   - ollama            (systemd service, *:11434)
#
# What runs on bm-node1 (192.168.10.2):
#   - vLLM              qwen3:32b, TP=8, port 8000
# =============================================================

services:
  mirofish:
    build: .
    container_name: mirofish-offline
    env_file:
      - .env
    ports:
      - "3002:3000"   # 3000 occupied by wiki.js
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      neo4j:
        condition: service_healthy

  neo4j:
    image: neo4j:5.18-community
    container_name: mirofish-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-mirofish}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  neo4j_data:
    external: true
    name: mirofish-offline-main_neo4j_data
  neo4j_logs:
    external: true
    name: mirofish-offline-main_neo4j_logs
