# =============================================================
# MiroFish-Offline — Battlematrix bm-control
# =============================================================
# What runs HERE (bm-control):
#   - mirofish-offline  (this compose)
#   - mirofish-neo4j    (external container, network: mirofish-offline-main_default)
#   - ollama            (systemd service, *:11434 -> 172.17.0.1)
#
# What runs on bm-node1 (192.168.10.2):
#   - vLLM              qwen3:32b, TP=8, port 8000
# =============================================================

services:
  mirofish:
    build: .
    container_name: mirofish-offline
    env_file:
      - .env
    ports:
      - "3002:3000"   # 3000 occupied by wiki.js
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
    extra_hosts:
      - "host-gateway:host-gateway"
    networks:
      - default
      - neo4j_net

networks:
  default: {}
  neo4j_net:
    external: true
    name: mirofish-offline-main_default
